<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EL9 Apache 初級ラボ</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-terminal-mode="embedded">
    <header class="topbar">
      <div>
        <p class="eyebrow">EL9系の共通操作を再現した固定の仮想教材環境</p>
        <h1>EL9 Apache 初級ラボ</h1>
      </div>
      <div class="topbar-actions">
        <button class="ghost-button" id="resetScenario" type="button">演習をリセット</button>
      </div>
    </header>

    <main class="app-shell">
      <aside class="exercise-rail" aria-label="演習一覧">
        <div class="rail-heading">
          <span>この演習のゴール</span>
          <strong id="progressText">0/0</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <span id="progressBar"></span>
        </div>
        <div id="scenarioList" class="scenario-list"></div>
      </aside>

      <section class="workspace" aria-label="ラボ本体">
        <section class="current-exercise">
          <div>
            <p class="eyebrow" id="exerciseMeta">初級</p>
            <h2 id="exerciseTitle"></h2>
            <p id="exerciseDescription"></p>
          </div>
          <div class="summary-box">
            <span>今回の流れ</span>
            <p id="exerciseSummary"></p>
          </div>
        </section>

        <section class="lab-grid">
          <article class="panel guide-panel">
            <div class="panel-title">
              <h3>手順</h3>
            </div>
            <div id="guideSteps" class="step-list"></div>
          </article>

          <article class="panel goals-panel">
            <div class="panel-title">
              <h3>ゴール</h3>
            </div>
            <ul id="goalList" class="goal-list"></ul>
          </article>

          <article class="panel state-panel">
            <div class="panel-title">
              <h3>仮想サーバー状態</h3>
            </div>
            <div id="serviceList" class="service-list"></div>
            <div class="state-split">
              <div>
                <h4>パッケージ</h4>
                <div id="packageList" class="package-list"></div>
              </div>
              <div>
                <h4>待ち受け</h4>
                <div id="listenerList" class="listener-list"></div>
              </div>
            </div>
            <div id="networkState" class="network-state"></div>
          </article>

          <article class="panel browser-panel">
            <div class="panel-title">
              <h3>仮想ブラウザ</h3>
            </div>
            <form id="browserForm" class="browser-bar">
              <input id="browserUrl" type="text" autocomplete="off" spellcheck="false" value="http://localhost/" aria-label="URL">
              <button id="browserGo" type="submit">開く</button>
              <button id="browserReload" class="icon-button" type="button" aria-label="再読み込み" title="再読み込み">↻</button>
            </form>
            <div id="browserViewport" class="browser-viewport"></div>
          </article>

          <article class="panel tips-panel">
            <div class="panel-title">
              <h3>進め方</h3>
            </div>
            <div id="learningSupport" class="learning-support"></div>
          </article>
        </section>

        <section id="terminalPanel" class="terminal-panel" aria-label="仮想端末">
          <div id="terminalHeader" class="terminal-header">
            <div>
              <span class="terminal-dot"></span>
              <strong>student@web01</strong>
            </div>
            <div class="terminal-controls">
              <button class="icon-button" type="button" data-terminal-mode="embedded" aria-label="埋め込み" title="埋め込み">▣</button>
              <button class="icon-button" type="button" data-terminal-mode="floating" aria-label="浮動表示" title="浮動表示">□</button>
              <button class="icon-button" type="button" data-terminal-mode="expanded" aria-label="拡大" title="拡大">⛶</button>
              <button class="icon-button" type="button" data-terminal-mode="minimized" aria-label="最小化" title="最小化">−</button>
              <button class="icon-button" type="button" id="terminalHome" aria-label="位置を戻す" title="位置を戻す">⌂</button>
            </div>
          </div>
          <div class="terminal-body">
            <div id="terminalOutput" class="terminal-output" aria-live="polite"></div>
            <p class="terminal-help">ヒントのコマンドチップは入力のみ行います。Enterキーまたは「実行」で実行してください。</p>
            <form id="terminalForm" class="terminal-form">
              <span class="prompt">[student@web01 ~]$</span>
              <input id="terminalInput" type="text" autocomplete="off" spellcheck="false" aria-label="コマンド入力">
              <button id="terminalRun" type="submit">実行</button>
            </form>
          </div>
          <span id="terminalResize" class="terminal-resize" aria-hidden="true"></span>
        </section>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
